<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sandbox - Settings</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav class="sidebar">
        <div class="logo">📦 DeployBox</div>
        <ul class="nav-links">
            <li><a href="index.html">Dashboard</a></li>
            <li><a href="projects.html">Projects</a></li>
            <li><a href="logs.html">Build Logs</a></li>
            <li class="active"><a href="settings.html">Settings</a></li>
            <li><a href="support.html">Docs & Support</a></li>
        </ul>
    </nav>

    <main class="main-content">
        <h1>Environment Settings</h1>
        <p class="subtitle">Inject keys and change configurations dynamically.</p>

        <div class="card" style="margin-bottom: 2rem;">
            <h3>Environment Variables</h3>
            <div class="grid" style="grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 0;">
                <div class="form-group">
                    <label>Key</label>
                    <input type="text" class="form-control" value="DATABASE_URL" readonly>
                </div>
                <div class="form-group">
                    <label>Value</label>
                    <input type="password" class="form-control" value="mongodb://localhost:27017/sandbox">
                </div>
            </div>
            <button class="btn">Add New Variable</button>
        </div>

        <div class="card">
            <h3>Destructive Actions</h3>
            <p style="color: var(--text-muted); margin-bottom: 1rem; font-size: 0.95rem;">Wiping the cluster resource will immediately terminate all active preview environments.</p>
            <button class="btn btn-error" onclick="alert('Cluster reset triggered!')">Reset Environment Cluster</button>
        </div>
    </main>
</body>
</html>
